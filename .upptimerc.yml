# Change these first
owner: Cautera-labs # Your GitHub organization or username, where this repository lives
repo: cautera-status # The name of this repository

sites:
  - name: Cautera App
    url: https://app.cautera.com/
  - name: API Proxy Health
    url: https://app.cautera.com/api/health
  - name: Trust Center API
    url: https://phyituqxevqqycikqguj.supabase.co/functions/v1/trust-center-data?slug=novapay
  - name: Auth (GoTrue)
    url: https://phyituqxevqqycikqguj.supabase.co/auth/v1/health
    # The Supabase API gateway returns 401 for /auth/v1/health without an
    # `apikey` header, but a response from GoTrue still proves the auth layer
    # is reachable and responding. Treat 401 as "up" so the monitor is stable.
    expectedStatusCodes:
      - 200
      - 401

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  cname: status.cautera.com
  # baseUrl: /your-repo-name
  name: Cautera Status
  logoUrl: https://www.cautera.com/images/brand/cautera_monogram_light.svg
  favicon: https://www.cautera.com/favicon.ico
  introTitle: "**Cautera Status**"
  introMessage: "Live availability and response times for the Cautera platform. This page updates automatically — check here for the current status of our services and any active incidents."
  theme: light
  # Cautera brand theme: re-skin Upptime's default green/teal to the brand
  # deep-blue (#1C4E80) used across cautera.com + app.cautera.com. "Operational"
  # uses the brand blue; problem states keep the universal red/amber so issues
  # still pop. The footer attribution is hidden (Upptime is MIT — attribution
  # required only in source, not on the rendered page).
  css: |
    :root {
      --body-background-color: #f5f7fa;
      --nav-current-border-bottom-color: #1c4e80;
      --up-color-color: #1c4e80;
      --up-border-left-color: #1c4e80;
      --tag-up-background-color: #1c4e80;
      --submit-button-background-color: #1c4e80;
      --submit-button-border-color: #1c4e80;
    }
    a { color: #1c4e80; }
    footer { display: none !important; }
  navbar:
    - title: Status
      href: /
    - title: Cautera
      href: https://www.cautera.com

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
